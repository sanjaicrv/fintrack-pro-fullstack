# =========================================
# TEST PROFILE - uses H2 in-memory database
# =========================================
spring.datasource.url=jdbc:h2:mem:budget_test_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

application.security.jwt.secret-key=4A616E61526F636B6574536563726574546F6B656E4B657932303234426F6F74
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

logging.level.com.budgetplanner=WARN
