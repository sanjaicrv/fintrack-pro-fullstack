# =============================================
# SERVER CONFIGURATION
# =============================================
server.port=8080
server.servlet.context-path=/api

# =============================================
# DATASOURCE CONFIGURATION (MySQL)
# =============================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Connection Pool (HikariCP)
spring.datasource.hikari.pool-name=BudgetPlannerHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# =============================================
# JPA / HIBERNATE CONFIGURATION
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =============================================
# JWT CONFIGURATION
# =============================================
application.security.jwt.secret-key=4A616E61526F636B6574536563726574546F6B656E4B657932303234426F6F74
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# =============================================
# LOGGING CONFIGURATION
# =============================================
logging.level.com.budgetplanner=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =============================================
# SPRINGDOC / SWAGGER CONFIGURATION
# =============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# =============================================
# JACKSON CONFIGURATION
# =============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# =============================================
# MAIL CONFIGURATION (Gmail SMTP)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:placeholder@gmail.com}
spring.mail.password=${GMAIL_APP_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# =============================================
# OAUTH2 CONFIGURATION (Google OAuth 2.0)
# =============================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder-google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/login/oauth2/code/google

application.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:5173/dashboard}
